<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargar ScanNote AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0072FF;
            --bg: #050A18;
            --card-bg: #0F172A;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: var(--bg);
            padding: 20px;
        }

        .download-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 28px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-small { width: 80px; height: 80px; margin-bottom: 1.5rem; }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .version { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; display: block; }

        .btn-download {
            display: block;
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #00C6FF, #0072FF);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0, 114, 255, 0.3);
        }

        .back-link { margin-top: 2rem; display: block; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="download-container">
        <img src="/assets/logo.svg" alt="ScanNote" class="logo-small">
        <h1>ScanNote AI Pro</h1>
        <span class="version">v1.5.0 • 25.8 MB</span>

        <p style="margin-bottom: 2rem; font-size: 0.95rem; color: var(--text-muted);">Haz clic abajo para iniciar la descarga oficial.</p>

        <!-- Botón corregido con ruta absoluta y JS fallback -->
        <a href="/scannote.apk" id="downloadBtn" class="btn-download" download="scannote.apk">
            Descargar APK
        </a>

        <a href="/" class="back-link">← Volver al inicio</a>
    </div>

    <script>
        // Si el clic no funciona (algunos navegadores móviles bloquean el 'download' attribute)
        document.getElementById('downloadBtn').onclick = function(e) {
            console.log("Iniciando descarga...");
            // El navegador debería manejarlo, pero esto asegura la ruta
        };
    </script>
</body>
</html>

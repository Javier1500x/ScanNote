<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradNote" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="0" dy="0" result="blur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Document Shape -->
  <path d="M30 20H80L95 35V100C95 105.523 90.5228 110 85 110H35C29.4772 110 25 105.523 25 100V25C25 22.2386 27.2386 20 30 20Z" fill="white" filter="url(#glow)"/>
  <!-- AI Pulse / Scan Line -->
  <rect x="20" y="55" width="80" height="4" rx="2" fill="url(#gradNote)" filter="url(#glow)">
    <animate attributeName="y" values="30;90;30" dur="3s" repeatCount="indefinite" />
  </rect>
  <!-- Text Lines -->
  <rect x="35" y="40" width="40" height="3" rx="1.5" fill="#E2E8F0"/>
  <rect x="35" y="50" width="50" height="3" rx="1.5" fill="#E2E8F0"/>
  <rect x="35" y="70" width="50" height="3" rx="1.5" fill="#E2E8F0"/>
  <rect x="35" y="80" width="30" height="3" rx="1.5" fill="#E2E8F0"/>
</svg>
